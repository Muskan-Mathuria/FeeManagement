<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #24292e;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            background: #2ea44f;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #22863a;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #24292e;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>My Project Demo</h1>
    <p>GitHub Demo Page</p>
</header>

<div class="container">

    <div class="card">
        <h2>About Project</h2>
        <p>This is a demo project created using HTML, CSS, and JavaScript.</p>
    </div>

    <div class="card">
        <h2>Features</h2>
        <ul>
            <li>Simple UI</li>
            <li>Responsive Design</li>
            <li>Easy to use</li>
        </ul>
    </div>

    <div class="card">
        <h2>Demo Action</h2>
        <button onclick="showMessage()">Click Me</button>
        <p id="msg"></p>
    </div>

</div>

<footer>
    <p>© 2026 My Project | Made for GitHub</p>
</footer>

<script>
    function showMessage() {
        document.getElementById("msg").innerText = "Button Clicked Successfully!";
    }
</script>

</body>
</html>
